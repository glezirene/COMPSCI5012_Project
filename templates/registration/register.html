{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container min-vh-100 d-flex justify-content-center align-items-start pt-5">
    <div class="custom-card" style="width: 400px;">
        <div class="card-body">
            <h3 class="custom-card-title text-center mb-4">Create an Account</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label custom-card-title">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label custom-card-title">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Email address" required>
                </div>

                <div class="mb-3">
                    <label class="form-label custom-card-title">Password</label>
                    <input type="password" name="password1" class="form-control" placeholder="Password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label custom-card-title">Confirm password</label>
                    <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg btn-block">
                        Register
                    </button>
                </div>

            </form>
            
        </div>
    </div>
</div>

{% endblock %}
