<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MoodFlix{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        nav {
            background: #0f0f1a;
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a4a;
        }
        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #9b59b6;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #9b59b6; }
        .nav-hamburger { display: none; background: none; border: none; color: #ccc; font-size: 1.5rem; cursor: pointer; }

        /* ── Messages ── */
        .messages { padding: 0.5rem 2rem; }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .alert-success { background: #1e3a2f; color: #5cb85c; border: 1px solid #2d5a3d; }
        .alert-error   { background: #3a1e1e; color: #e74c3c; border: 1px solid #5a2d2d; }
        .alert-info    { background: #1e2a3a; color: #3498db; border: 1px solid #2d3d5a; }

        /* ── Main layout ── */
        main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }

        /* ── Cards ── */
        .card {
            background: #16213e;
            border: 1px solid #9b59b6;
            border-radius: 12px;
            padding: 1.25rem;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 1rem;
            text-align: center;
        }

        /* ── Forms ── */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.35rem; color: #aaa; font-size: 0.85rem; }
        .form-control {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: #0f0f1a;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-control:focus { outline: none; border-color: #9b59b6; }
        .form-control option { background: #0f0f1a; }

        /* ── Buttons ── */
        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-primary  { background: #9b59b6; color: #fff; }
        .btn-danger   { background: #e74c3c; color: #fff; }
        .btn-secondary{ background: #2a2a4a; color: #ccc; }
        .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

        /* ── Stars ── */
        .stars { color: #f1c40f; letter-spacing: 2px; }
        .star-radio { display: none; }

        /* ── Film grid ── */
        .film-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }
        .film-card {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.2s;
        }
        .film-card:hover { border-color: #9b59b6; transform: translateY(-3px); }
        .film-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: #0f0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #3a3a5a;
        }
        .film-info { padding: 0.6rem; }
        .film-title { font-size: 0.85rem; font-weight: 600; color: #fff; margin-bottom: 0.2rem; }
        .film-year  { font-size: 0.75rem; color: #888; }
        .film-genre { font-size: 0.7rem; color: #9b59b6; margin-top: 0.2rem; }

        /* ── Mood pills ── */
        .mood-grid { display: flex; flex-direction: column; gap: 0.5rem; }
        .mood-btn {
            display: block;
            width: 100%;
            padding: 0.6rem;
            background: #9b59b6;
            color: #fff;
            border: none;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .mood-btn:hover, .mood-btn.active { background: #7d3c98; }

        /* ── Review item ── */
        .review-item {
            border-bottom: 1px solid #2a2a4a;
            padding: 0.75rem 0;
        }
        .review-item:last-child { border-bottom: none; }
        .review-meta { font-size: 0.75rem; color: #888; margin-bottom: 0.3rem; }
        .review-text { font-size: 0.85rem; color: #ccc; }

        /* ── 3-column layout ── */
        .home-grid {
            display: grid;
            grid-template-columns: 220px 1fr 220px;
            gap: 1.5rem;
            align-items: start;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .home-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; flex-direction: column; position: absolute; top: 60px; right: 0; background: #0f0f1a; width: 200px; padding: 1rem; border: 1px solid #2a2a4a; border-radius: 0 0 8px 8px; z-index: 100; }
            .nav-links.open { display: flex; }
            .nav-hamburger { display: block; }
        }
    </style>
</head>
<body>

<nav>
    <a href="{% url 'home' %}" class="nav-logo">MoodFlix</a>
    <button class="nav-hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'watchlist' %}">Watchlist</a>
        <a href="{% url 'profile' %}">Reviews</a>
        <a href="#">Settings</a>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">{{ user.username }}</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="background:none;border:none;color:#ccc;font-size:0.9rem;cursor:pointer;padding:0;">Log out</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Log in</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </div>
</nav>

{% if messages %}
<div class="messages">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
